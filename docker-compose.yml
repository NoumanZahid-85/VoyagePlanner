services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: travelplanner
      POSTGRES_PASSWORD: travelplanner
      POSTGRES_DB: travelplanner
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
